name: Frontend CI/CD

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Dynamic Backend URL passed from backend CI'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    paths:
      - 'frontend/**'

permissions:
  checks: write
  contents: read
  id-token: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build
  # ─────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ inputs.backend_url || secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/.next
          retention-days: 1
          include-hidden-files: true

  # ─────────────────────────────────────────
  # JOB 2a: Deploy to Live
  # ─────────────────────────────────────────
  deploy-live:
    name: Deploy to Firebase (Live)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/.next

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting (live)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ inputs.backend_url || secrets.NEXT_PUBLIC_API_URL }}
        run: |
          npx firebase-tools experiments:enable webframeworks
          npx firebase-tools deploy --only hosting --project ${{ vars.GCP_PROJECT_ID }} --non-interactive

      - name: Update FRONTEND_URL to Latest
        run: |
          FRONTEND_URL="https://${{ vars.GCP_PROJECT_ID }}.web.app"
          gcloud secrets delete FRONTEND_URL --project ${{ vars.GCP_PROJECT_ID }} --quiet || true
          gcloud secrets create FRONTEND_URL --replication-policy="automatic" --project ${{ vars.GCP_PROJECT_ID }}
          echo -n "$FRONTEND_URL" | gcloud secrets versions add FRONTEND_URL --data-file=- --project ${{ vars.GCP_PROJECT_ID }} --quiet

  # ─────────────────────────────────────────
  # JOB 2b: Deploy Preview (PR only)
  # ─────────────────────────────────────────
  deploy-preview:
    name: Deploy Firebase Preview (PR)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/.next

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting (preview)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ inputs.backend_url || secrets.NEXT_PUBLIC_API_URL }}
        run: |
          npx firebase-tools experiments:enable webframeworks
          npx firebase-tools hosting:channel:deploy pr-${{ github.event.number }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --expires 7d